<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подвал с иконками</title>
    <style>
        /* Основные стили для подвала */
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            font-family: Arial, sans-serif;
        }

        /* Стили для блока с иконками */
        .social-icons {
            margin-bottom: 10px;
        }

        .social-icons a {
            margin: 0 10px;
            display: inline-block;
        }

        .social-icons img {
            width: 32px;
            height: 32px;
            transition: opacity 0.3s ease;
        }

        .social-icons img:hover {
            opacity: 0.7;
        }

        /* Стили для блока с текстом copyright */
        .copyright {
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Подвал -->
    <footer>
        <!-- Блок с иконками -->
        <div class="social-icons">
            <a href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram"></a>
            <a href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111392.png" alt="Facebook"></a>
            <a href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111738.png" alt="YouTube"></a>
            <a href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111720.png" alt="Twitter"></a>
        </div>

        <!-- Блок с текстом copyright -->
        <div class="copyright">
            &copy; 2023 Ваша компания. Все права защищены.
        </div>
    </footer>

</body>
</html>
